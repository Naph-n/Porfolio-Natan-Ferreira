<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Proposta - Natan Ferreira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #fafafa;
            --accent-color: #2563eb;
            --container-bg: #ffffff;
            --container-text: #1a1a1a;
            --muted-text: #666666;
            --border-color: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .logo svg {
            height: 28px;
            width: auto;
            fill: white;
        }

        /* Main Content */
        main {
            padding: 140px 20px 80px;
            min-height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
        }

        .proposal-container {
            background-color: var(--container-bg);
            color: var(--container-text);
            width: 100%;
            max-width: 800px;
            padding: 60px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--container-text);
            letter-spacing: -0.02em;
        }

        .divider {
            height: 4px;
            width: 60px;
            background-color: var(--accent-color);
            margin-bottom: 40px;
            border-radius: 2px;
        }

        .content-section {
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .investment-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
        }

        .investment-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted-text);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .investment-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        /* Footer */
        footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .proposal-container {
                padding: 30px;
            }
            h1 {
                font-size: 2rem;
            }
            header {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 43.017 30.976">
                <g>
                    <path d="M 43.017 0.09 L 34.007 0.09 C 31.696 0.09 29.821 1.818 29.821 3.949 L 29.821 30.976 L 35.962 30.976 L 35.962 7.171 C 35.962 6.387 36.651 5.751 37.502 5.751 L 43.017 5.751 L 43.017 0.09 Z" />
                    <path d="M 25.41 7.196 L 30.473 7.196 L 30.473 12.837 L 25.41 12.837 Z M 22.472 3.382 C 22.472 1.514 20.829 0 18.804 0 L 3.669 0 C 1.643 0 0 1.514 0 3.382 L 0 30.886 L 6.14 30.886 L 6.14 6.539 C 6.14 6.054 6.567 5.661 7.093 5.661 L 15.379 5.661 C 15.905 5.661 16.332 6.054 16.332 6.539 L 16.332 30.886 L 22.472 30.886 Z" />
                </g>
            </svg>
            <span>Natan Ferreira</span>
        </a>
    </header>

    <main>
        <div class="proposal-container">
            <h1 id="titulo-proposta">Título do Orçamento</h1>
            <div class="divider"></div>
            
            <div id="corpo-proposta" class="content-section">
                <p>Aqui entrarão os detalhes da proposta.</p>
            </div>

            <div class="investment-section">
                <p class="investment-label">Investimento Estimado</p>
                <div id="investimento-proposta" class="investment-value">
                    R$ 0.000,00
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Natan Ferreira. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
